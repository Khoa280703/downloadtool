services:
  postgres:
    image: postgres:16-alpine
    container_name: downloadtool-postgres
    environment:
      - POSTGRES_DB=downloadtool
      - POSTGRES_USER=downloadtool
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      app:
        aliases:
          - downloadtool-postgres-internal

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: downloadtool-api
    environment:
      - PORT=3068
      - RUST_LOG=info
      - SOCKS5_PROXY_URL=${SOCKS5_PROXY_URL}
      - PROXY_LIST=${PROXY_LIST}
      - DATABASE_URL=postgres://downloadtool:${POSTGRES_PASSWORD}@downloadtool-postgres-internal:5432/downloadtool
      - REDIS_URL=${REDIS_URL}
      - MUX_QUEUE_STREAM=${MUX_QUEUE_STREAM}
      - MUX_ARTIFACT_BACKEND=${MUX_ARTIFACT_BACKEND}
      - MUX_DIRECT_DOWNLOAD=${MUX_DIRECT_DOWNLOAD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - WHOP_WEBHOOK_SECRET=${WHOP_WEBHOOK_SECRET}
    expose:
      - "3068"
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
    networks:
      app:
        aliases:
          - downloadtool-api-internal
      coolify:
    labels:
      - "traefik.docker.network=coolify"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: downloadtool-worker
    environment:
      - RUST_LOG=info
      - SOCKS5_PROXY_URL=${SOCKS5_PROXY_URL}
      - PROXY_LIST=${PROXY_LIST}
      - DATABASE_URL=postgres://downloadtool:${POSTGRES_PASSWORD}@downloadtool-postgres-internal:5432/downloadtool
      - REDIS_URL=${REDIS_URL}
      - MUX_QUEUE_STREAM=${MUX_QUEUE_STREAM}
      - MUX_ARTIFACT_BACKEND=${MUX_ARTIFACT_BACKEND}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
    networks:
      app:
      coolify:

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api-download.khoadangbui.online}
    container_name: downloadtool-frontend
    environment:
      - NODE_ENV=production
      - PORT=5168
      - HOST=0.0.0.0
      - ORIGIN=${ORIGIN}
      - DATABASE_URL=postgres://downloadtool:${POSTGRES_PASSWORD}@downloadtool-postgres-internal:5432/downloadtool
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - WHOP_PLAN_ID=${WHOP_PLAN_ID}
      - RUST_API_URL=http://downloadtool-api-internal:3068
    expose:
      - "5168"
    restart: unless-stopped
    depends_on:
      - postgres
      - api
    networks:
      app:
    labels:
      - "traefik.docker.network=coolify"

volumes:
  api-data:
  postgres-data:

networks:
  app:
  coolify:
    external: true
