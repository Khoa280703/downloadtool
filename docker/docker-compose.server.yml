services:
  shared-proxy-postgres:
    image: postgres:16-alpine
    container_name: shared-proxy-postgres
    environment:
      - POSTGRES_DB=downloadtool_proxy
      - POSTGRES_USER=downloadtool_proxy
      - POSTGRES_PASSWORD=${SHARED_PROXY_POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=100
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - shared-proxy-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U downloadtool_proxy -d downloadtool_proxy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  shared-proxy-redis:
    image: redis:7-alpine
    container_name: shared-proxy-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
      - --maxmemory-policy
      - noeviction
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - shared-proxy-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: downloadtool-postgres
    environment:
      - POSTGRES_DB=downloadtool
      - POSTGRES_USER=downloadtool
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15431}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: downloadtool-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: downloadtool-api
    environment:
      - PORT=3068
      - RUST_LOG=info
      - PROXY_QUARANTINE_FILE=/app/proxy-state/quarantined-proxies.txt
      - DATABASE_URL=postgres://downloadtool:${POSTGRES_PASSWORD}@postgres:5432/downloadtool
      - PROXY_DATABASE_URL=postgres://downloadtool_proxy:${SHARED_PROXY_POSTGRES_PASSWORD}@shared-proxy-postgres:5432/downloadtool_proxy
      - REDIS_URL=redis://redis:6379
      - PROXY_REDIS_URL=redis://shared-proxy-redis:6379
      - PROXY_QUARANTINE_TTL_SECS=${PROXY_QUARANTINE_TTL_SECS}
      - MUX_QUEUE_STREAM=${MUX_QUEUE_STREAM}
      - MUX_ARTIFACT_BACKEND=${MUX_ARTIFACT_BACKEND}
      - MUX_FILE_TICKET_TTL_SECS=${MUX_FILE_TICKET_TTL_SECS}
      - MUX_DIRECT_DOWNLOAD=${MUX_DIRECT_DOWNLOAD}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - WHOP_WEBHOOK_SECRET=${WHOP_WEBHOOK_SECRET}
    expose:
      - "3068"
    volumes:
      - api-data:/app/data
      - proxy-quarantine-data:/app/proxy-state
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      shared-proxy-postgres:
        condition: service_healthy
      shared-proxy-redis:
        condition: service_healthy
    labels:
      - "traefik.docker.network=coolify"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: downloadtool-worker
    environment:
      - RUST_LOG=info
      - PROXY_QUARANTINE_FILE=/app/proxy-state/quarantined-proxies.txt
      - DATABASE_URL=postgres://downloadtool:${POSTGRES_PASSWORD}@postgres:5432/downloadtool
      - PROXY_DATABASE_URL=postgres://downloadtool_proxy:${SHARED_PROXY_POSTGRES_PASSWORD}@shared-proxy-postgres:5432/downloadtool_proxy
      - REDIS_URL=redis://redis:6379
      - PROXY_REDIS_URL=redis://shared-proxy-redis:6379
      - PROXY_QUARANTINE_TTL_SECS=${PROXY_QUARANTINE_TTL_SECS}
      - MUX_QUEUE_STREAM=${MUX_QUEUE_STREAM}
      - MUX_ARTIFACT_BACKEND=${MUX_ARTIFACT_BACKEND}
      - MUX_ARTIFACT_TTL_SECS=${MUX_ARTIFACT_TTL_SECS}
      - MUX_CLEANUP_INTERVAL_SECS=${MUX_CLEANUP_INTERVAL_SECS}
      - MUX_WORKER_CONCURRENCY=${MUX_WORKER_CONCURRENCY:-64}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION}
    volumes:
      - proxy-quarantine-data:/app/proxy-state
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      shared-proxy-postgres:
        condition: service_healthy
      shared-proxy-redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.snapvie.com}
    container_name: downloadtool-frontend
    environment:
      - NODE_ENV=production
      - PORT=5168
      - HOST=0.0.0.0
      - ORIGIN=${ORIGIN}
      - DATABASE_URL=postgres://downloadtool:${POSTGRES_PASSWORD}@postgres:5432/downloadtool
      - PROXY_DATABASE_URL=postgres://downloadtool_proxy:${SHARED_PROXY_POSTGRES_PASSWORD}@shared-proxy-postgres:5432/downloadtool_proxy
      - REDIS_URL=redis://redis:6379
      - PROXY_REDIS_URL=redis://shared-proxy-redis:6379
      - PROXY_QUARANTINE_TTL_SECS=${PROXY_QUARANTINE_TTL_SECS}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - WHOP_PLAN_ID=${WHOP_PLAN_ID}
      - RUST_API_URL=http://api:3068
      - DOWNLOAD_DELIVERY_MODE=${DOWNLOAD_DELIVERY_MODE:-direct}
      - DOWNLOAD_PROXY_UA_REGEX=${DOWNLOAD_PROXY_UA_REGEX:-Safari|iPhone|iPad}
    expose:
      - "5168"
    restart: unless-stopped
    depends_on:
      - postgres
      - api
      - shared-proxy-postgres
      - shared-proxy-redis
    networks:
      default:
    labels:
      - "traefik.docker.network=coolify"

volumes:
  api-data:
  postgres-data:
  redis-data:
  proxy-quarantine-data:
  shared-proxy-postgres-data:
    name: shared-proxy-postgres-data
  shared-proxy-redis-data:
    name: shared-proxy-redis-data
