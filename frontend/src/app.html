<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>

		<meta name="theme-color" content="#ff4d8c" />
		<link rel="icon" href="/logo.svg" type="image/svg+xml" sizes="any" />
		<link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
		<link rel="icon" href="/favicon-48x48.png" type="image/png" sizes="48x48" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
		<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" sizes="any" />
		<link rel="manifest" href="/manifest.json" />
		<!-- Cloudflare Web Analytics -->
		<script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "0927c4a923074292bf514dd6fabdadaf"}'></script>
		<!-- End Cloudflare Web Analytics -->

		<!-- Preconnect to Google Fonts CDN for icon font -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

		<!-- Preload self-hosted critical fonts (Nunito body, Fredoka heading) -->
		<link rel="preload" href="/fonts/nunito-normal-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
		<link rel="preload" href="/fonts/fredoka-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover"><div style="display: contents">%sveltekit.body%</div></body>
</html>
